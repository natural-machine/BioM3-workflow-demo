# Pipeline configuration for SH3 mini subset (quick full-pipeline test)
# Run: python run_pipeline.py configs/pipeline_SH3_mini.toml
#
# Uses a 500-row random sample of the full SH3 training data.
# Regenerate with:
#   python scripts/create_mini_dataset.py data/SH3/FINAL_SH3_all_dataset_with_prompts.csv \
#       -n 500 -o data/SH3_mini/FINAL_SH3_mini_all_dataset_with_prompts.csv --seed 42

[pipeline]
steps = [1, 2, 3, 5, 6, "6b", 7, 8]

[environments]
biom3     = "biom3-env"       # Steps 1-3, 7-8
colabfold = "colabfold"       # Step 5
blast     = "blast-env"       # Step 6

[paths]
output_dir  = "outputs/SH3_mini"
input_csv   = "data/SH3_mini/FINAL_SH3_mini_all_dataset_with_prompts.csv"
prompts_csv = "data/SH3/SH3_prompts.csv"
epochs      = 10
# model_weights = "outputs/SH3_mini/finetuning/checkpoints/.../state_dict.best.pth"
# pt_file       = "outputs/SH3_mini/generation/SH3_prompts.ProteoScribe_output.pt"

[finetuning]
config = "configs/stage3_config_finetune.json"

[blast]
db      = "swissprot"
threads = 16

