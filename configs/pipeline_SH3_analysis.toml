# Pipeline configuration for SH3 analysis only (Steps 4-8)
# Run: python run_pipeline.py configs/pipeline_SH3_analysis.toml

[pipeline]
steps = [4, 5, 6, "6b", 7, 8]

[environments]
biom3     = "biom3-env"
colabfold = "colabfold"
blast     = "blast-env"

[paths]
output_dir = "outputs/SH3"
pt_file    = "outputs/SH3/generation/SH3_prompts.ProteoScribe_output.pt"

[blast]
db      = "swissprot"
threads = 16
