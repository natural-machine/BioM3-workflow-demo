# Pipeline configuration for SH3 protein family (full pipeline)
# Run: python run_pipeline.py configs/pipelines/SH3.toml

[pipeline]
steps = [1, 2, 3, 4, 5, "5b", 6, 7]

[environments]
biom3     = "biom3-env"       # Steps 1-3, 6-7
colabfold = "colabfold"       # Step 4
blast     = "blast-env"       # Step 5

[paths]
output_dir  = "outputs/SH3"
input_csv   = "data/SH3/FINAL_SH3_all_dataset_with_prompts.csv"
prompts_csv = "data/SH3/SH3_prompts.csv"
epochs      = 50
# model_weights = "outputs/SH3/finetuning/checkpoints/.../state_dict.best.pth"
# pt_file       = "outputs/SH3/generation/SH3_prompts.ProteoScribe_output.pt"

[finetuning]
config = "configs/stage3_config_finetune.json"

[blast]
db      = "swissprot"
threads = 16

# [generation]
# unmasking_order = "confidence"
# token_strategy  = "argmax"
