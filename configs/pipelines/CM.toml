# Pipeline configuration for CM (Chorismate Mutase) protein family
# Run: python run_pipeline.py configs/pipelines/CM.toml

[pipeline]
steps = [1, 2, 3, 4, 5, "5b", 6, 7]

[environments]
biom3     = "biom3-env"
colabfold = "colabfold"
blast     = "blast-env"

[paths]
output_dir  = "outputs/CM"
input_csv   = "data/CM/FINAL_CM_all_dataset_with_prompts.csv"
prompts_csv = "data/CM/CM_prompts.csv"
epochs      = 50

[finetuning]
config = "configs/stage3_training/finetune.json"

[blast]
db      = "swissprot"
threads = 16
